server {
    listen 80;
    server_name _;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    location = / {
        return 302 /lp1/;
    }

    location = /lp1 {
        return 301 /lp1/;
    }

    location /lp1/ {
        alias /usr/share/nginx/html/lp1/;
        index index.html;
        try_files $uri $uri/ /lp1/index.html;
    }
}
